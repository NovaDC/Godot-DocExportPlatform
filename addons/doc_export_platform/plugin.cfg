[plugin]

name="Doc Export Platform"
description="An Editor Export Platform for Godot used to export api documents using godot's export menu into a wide array of document formats.
Depending on the formats desired to export to, the sphinx document generator and/or Godot's make_rst.py script (and its dependencies) must also be available.
This plugin also provides means for easy installation of make_rst.py and Godot's official sphinx conf.

Exporting documents beyond Godot's xml format will require python, and exporting any format besides rst or Godot's xml will require sphinx to be installed in that same python environment.

Requires the NovaTools plugin as a dependency. NovaTools does not need to be enabled for this plugin to function."
author="NovaDC"
version="v1.0.1.0"
script="plugin.gd"
